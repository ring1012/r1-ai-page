<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyber_grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/> <!-- Cyan -->
      <stop offset="0.5" stop-color="#3b82f6"/> <!-- Blue -->
      <stop offset="1" stop-color="#a855f7"/> <!-- Purple -->
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagon Border - The "Shell" -->
  <path d="M32 4 L58 19 V45 L32 60 L6 45 V19 Z" stroke="url(#cyber_grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Neural Connectivity Pathways -->
  <path d="M32 4 V16" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <path d="M58 19 L48 26" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <path d="M6 19 L16 26" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <path d="M58 45 L48 38" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <path d="M6 45 L16 38" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <path d="M32 60 V48" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>

  <!-- Inner Glowing AI Diamond - The "Brain" -->
  <path d="M32 18 L46 32 L32 46 L18 32 Z" fill="url(#cyber_grad)" fill-opacity="0.9" />
  
  <!-- Core Pulse Nodes - The "Neurons" -->
  <circle cx="32" cy="32" r="3.5" fill="white" />
  <circle cx="32" cy="24" r="1.5" fill="white" fill-opacity="0.8" />
  <circle cx="32" cy="40" r="1.5" fill="white" fill-opacity="0.8" />
  <circle cx="24" cy="32" r="1.5" fill="white" fill-opacity="0.8" />
  <circle cx="40" cy="32" r="1.5" fill="white" fill-opacity="0.8" />
  
  <!-- Subtle circular scan ring -->
  <circle cx="32" cy="32" r="22" stroke="url(#cyber_grad)" stroke-width="0.5" stroke-opacity="0.4" stroke-dasharray="2 4" />
</svg>
